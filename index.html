<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050714">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Nova Blade Rush</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 0,#17234f,#080b1d 45%,#02030a)}
    #game-shell{position:relative;width:min(100vw,calc(100svh * 9 / 16));height:min(100svh,calc(100vw * 16 / 9));max-width:480px;max-height:854px;overflow:hidden;background:#050714;box-shadow:0 0 50px #0077ff55,0 20px 80px #000;touch-action:none;user-select:none}.shake{animation:shake .28s linear}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}canvas{display:block;width:100%;height:100%;touch-action:none}
    .hud{position:absolute;z-index:2;top:max(15px,env(safe-area-inset-top));left:16px;right:16px;display:flex;justify-content:space-between;gap:8px;pointer-events:none;color:#eaf7ff;font-weight:800;letter-spacing:.06em;text-shadow:0 0 10px #00aaff}.hud small{display:block;color:#80b8dc;font-size:.58rem}.hud span{font-size:.9rem}.hud .center{text-align:center;flex:1}.meter{height:5px;margin-top:4px;border:1px solid #58c7ff;background:#071221;border-radius:4px;overflow:hidden}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#69edff,#197dff);transition:width .1s}
    .icon-button{position:absolute;z-index:4;right:15px;bottom:max(15px,env(safe-area-inset-bottom));width:38px;height:38px;border:1px solid #61d9ff66;border-radius:50%;background:#061126b3;color:#dff7ff;font-size:1rem}.overlay{position:absolute;inset:0;z-index:3;display:grid;place-items:center;padding:22px;background:linear-gradient(#05081799,#050817e8);overflow:auto}.panel{width:min(100%,330px);padding:24px 21px;border:1px solid #37b9ff99;border-radius:18px;background:#0a1028ed;box-shadow:0 0 32px #007dff44,inset 0 0 28px #162f7644}h1{margin:0;color:#59d9ff;font-size:clamp(2.65rem,14vw,4rem);font-style:italic;line-height:.9;letter-spacing:-.08em;text-shadow:0 0 10px #00b7ff,0 0 28px #166cff}.subtitle{margin:12px 0 17px;color:#bbd6ee;font-size:.85rem;line-height:1.55}.stats{display:flex;justify-content:space-between;margin:12px 0;color:#93d9ff;font-size:.72rem}.skin{margin:12px 0;padding:10px;border:1px solid #4abfff55;border-radius:10px;color:#d9f5ff;font-size:.78rem}.row{display:flex;gap:8px}.row button{flex:1}button{border:0;border-radius:10px;padding:13px 14px;cursor:pointer;color:#03111c;background:linear-gradient(135deg,#62e5ff,#138eff);box-shadow:0 0 22px #009dff70;font:inherit;font-size:.74rem;font-weight:900;letter-spacing:.07em;text-transform:uppercase}button.alt{color:#bcecff;background:#122b4c;box-shadow:none}button:active{transform:scale(.98)}#result{margin:14px 0;color:#d9f5ff;font-size:.92rem;line-height:1.6}.board{margin:12px 0;text-align:left;font-size:.73rem;color:#bcd9e9}.board div{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #3ca8db22}.hidden{display:none}
  </style>
</head>
<body>
  <main id="game-shell" aria-label="Nova Blade Rush space-fantasy runner">
    <canvas id="game" aria-label="Game area"></canvas>
    <div class="hud"><div><small>SCORE</small><span id="score">00000</span></div><div class="center"><small id="power">READY</small><div class="meter"><i id="nitro-meter"></i></div></div><div style="text-align:right"><small>COINS / BEST</small><span id="wallet">0 / 00000</span></div></div>
    <button id="sound" class="icon-button" type="button" aria-label="Toggle sound">♪</button>
    <section id="menu" class="overlay"><div class="panel"><h1>NOVA<br>BLADE</h1><p class="subtitle">Run the astral corridor. Tap left or right to dodge raiders and swing your plasma blade.</p><div class="stats"><span id="coin-total">✦ 0 crystals</span><span id="daily">Daily: 0 / 350</span></div><div class="skin"><strong id="skin-name">Lumen Vanguard</strong><br><span id="skin-detail">Azure plasma blade</span><div class="row" style="margin-top:9px"><button id="skin-button" class="alt" type="button">Next Warrior</button><button id="install" class="alt hidden" type="button">Install</button></div></div><button id="start-button" type="button">Begin Run</button><p class="subtitle" style="margin:13px 0 0">Keyboard: ← → or A / D</p></div></section>
    <section id="gameover" class="overlay hidden"><div class="panel"><h1 style="font-size:2.1rem">WRECKED</h1><div id="result"></div><div id="leaderboard" class="board"></div><div class="row"><button id="restart-button" type="button">Race Again</button><button id="share-button" class="alt" type="button">Share</button></div></div></section>
  </main>
  <script>
    (()=>{"use strict";
      const W=360,H=640,LANES=3,DAY=new Date().toISOString().slice(0,10),STORE="rain-rush-v2";
      const State=Object.freeze({MENU:"MENU",PLAYING:"PLAYING",GAMEOVER:"GAMEOVER"});
      const skins=[{name:"Lumen Vanguard",detail:"Azure plasma blade",color:"#44dfff",price:0},{name:"Ember Nomad",detail:"Earn 60 crystals",color:"#ff9d27",price:60},{name:"Void Adept",detail:"Earn 140 crystals",color:"#bd65ff",price:140},{name:"Verdant Oracle",detail:"Earn 280 crystals",color:"#3effc4",price:280}];
      const canvas=document.querySelector("#game"),ctx=canvas.getContext("2d"),shell=document.querySelector("#game-shell"),menu=document.querySelector("#menu"),over=document.querySelector("#gameover");
      const $=id=>document.querySelector(id),scoreEl=$("#score"),walletEl=$("#wallet"),powerEl=$("#power"),meter=$("#nitro-meter"),coinTotal=$("#coin-total"),dailyEl=$("#daily"),skinName=$("#skin-name"),skinDetail=$("#skin-detail"),skinButton=$("#skin-button"),resultEl=$("#result"),boardEl=$("#leaderboard"),soundButton=$("#sound");
      let state=State.MENU,last=0,frame=0,audio=null,installPrompt=null,data=load(),shake=0;
      const game={score:0,coins:0,elapsed:0,speed:190,spawn:0,bonusSpawn:2.4,obstacles:[],pickups:[],particles:[],shield:0,slow:0,magnet:0,nitro:0,player:{lane:1,x:180,y:535,width:48,height:82},rain:Array.from({length:105},rainDrop)};
      function load(){try{return {...{best:0,coins:0,skin:0,sound:true,scores:[],daily:{date:DAY,progress:0,done:false}},...JSON.parse(localStorage.getItem(STORE)||"{}")}}catch{return {best:0,coins:0,skin:0,sound:true,scores:[],daily:{date:DAY,progress:0,done:false}}}}
      function save(){try{localStorage.setItem(STORE,JSON.stringify(data))}catch{}}
      function today(){if(data.daily.date!==DAY)data.daily={date:DAY,progress:0,done:false}}
      function laneX(lane){return W*(lane+.5)/LANES}function rainDrop(){return{x:Math.random()*W,y:Math.random()*H,length:8+Math.random()*18,speed:220+Math.random()*330,alpha:.16+Math.random()*.34}}
      function resize(){const d=Math.min(devicePixelRatio||1,2);canvas.width=W*d;canvas.height=H*d;ctx.setTransform(d,0,0,d,0,0)}
      function ui(){today();scoreEl.textContent=String(game.score).padStart(5,"0");walletEl.textContent=`${data.coins} / ${String(data.best).padStart(5,"0")}`;coinTotal.textContent=`✦ ${data.coins} crystals`;dailyEl.textContent=data.daily.done?"Daily complete ✓":`Daily: ${data.daily.progress} / 350`;skinName.textContent=skins[data.skin].name;skinDetail.textContent=skins[data.skin].detail;meter.style.width=`${Math.round(game.nitro/3*100)}%`;powerEl.textContent=game.shield?"AURA SHIELD":game.slow?"STASIS":game.magnet?"CRYSTAL PULL":game.nitro?"BLADE RUSH":"READY"}
      function reset(){Object.assign(game,{score:0,coins:0,elapsed:0,speed:190,spawn:.35,bonusSpawn:2.3,obstacles:[],pickups:[],particles:[],shield:0,slow:0,magnet:0,nitro:0});Object.assign(game.player,{lane:1,x:laneX(1)});ui()}
      function start(){cancelAnimationFrame(frame);reset();unlockAudio();state=State.PLAYING;menu.classList.add("hidden");over.classList.add("hidden");last=performance.now();frame=requestAnimationFrame(loop)}
      function end(){state=State.GAMEOVER;data.best=Math.max(data.best,game.score);data.coins+=game.coins;data.scores=[...data.scores,{score:game.score,date:DAY}].sort((a,b)=>b.score-a.score).slice(0,5);save();ui();resultEl.innerHTML=`Score: <strong>${String(game.score).padStart(5,"0")}</strong> · Crystals: <strong>+${game.coins}</strong><br>${data.daily.done?"Daily challenge complete: +15 crystals":"Reach 350 points for today's 15-crystal bonus."}`;boardEl.innerHTML=`<strong>LOCAL LEADERBOARD</strong>${data.scores.map((s,i)=>`<div><span>#${i+1} YOU</span><b>${s.score}</b></div>`).join("")}`;over.classList.remove("hidden");sound("crash");vibrate([70,35,120]);shell.classList.remove("shake");void shell.offsetWidth;shell.classList.add("shake")}
      function move(d){if(state!==State.PLAYING)return;const before=game.player.lane;game.player.lane=Math.max(0,Math.min(2,before+d));if(before!==game.player.lane){sound("move");vibrate(8)}}
      function spawnCar(){const types=[{color:"#ee4d78",width:48,height:86,label:"WRAITH"},{color:"#ffad36",width:46,height:80,label:"DROID"},{color:"#b675ff",width:52,height:90,label:"RAIDER"}],t=types[Math.floor(Math.random()*types.length)];game.obstacles.push({lane:Math.floor(Math.random()*LANES),x:0,y:-t.height-20,near:false,...t})}
      function spawnPickup(){const types=[{kind:"coin",color:"#ffe94a",label:"✦"},{kind:"nitro",color:"#38dfff",label:"R"},{kind:"shield",color:"#d175ff",label:"A"},{kind:"slow",color:"#90f0ff",label:"S"},{kind:"magnet",color:"#ff70cb",label:"P"}];const t=types[Math.floor(Math.random()*types.length)];game.pickups.push({lane:Math.floor(Math.random()*LANES),x:0,y:-25,width:28,height:28,...t})}
      function overlap(a,b){return a.x-a.width/2<b.x+b.width/2&&a.x+a.width/2>b.x-b.width/2&&a.y-a.height/2<b.y+b.height/2&&a.y+a.height/2>b.y-b.height/2}
      function burst(x,y,color,count=12){for(let i=0;i<count;i++)game.particles.push({x,y,vx:(Math.random()-.5)*150,vy:(Math.random()-.5)*150,life:.25+Math.random()*.45,color})}
      function collect(item){if(item.kind==="coin"){game.coins++;game.score+=8;sound("coin");burst(item.x,item.y,item.color,6)}else{game[item.kind]=item.kind==="nitro"?3:6;sound("power");burst(item.x,item.y,item.color,15)}vibrate(12)}
      function updateRain(dt){for(const r of game.rain){r.y+=r.speed*dt;r.x-=r.speed*dt*.12;if(r.y>H+r.length||r.x<-10)Object.assign(r,rainDrop(),{x:Math.random()*(W+40),y:-Math.random()*120})}}
      function update(dt){updateRain(dt);game.elapsed+=dt;game.speed=190+Math.min(240,game.elapsed*7);for(const key of ["shield","slow","magnet","nitro"])game[key]=Math.max(0,game[key]-dt);game.spawn-=dt;game.bonusSpawn-=dt;if(game.spawn<=0){spawnCar();game.spawn=Math.max(.4,.92-game.elapsed*.009)*(.82+Math.random()*.35)}if(game.bonusSpawn<=0){spawnPickup();game.bonusSpawn=2.4+Math.random()*2.7}game.player.x+=(laneX(game.player.lane)-game.player.x)*Math.min(1,dt*15);const traffic=game.speed*(game.slow?.47:1)*(game.nitro?1.22:1);for(const car of game.obstacles){car.x=laneX(car.lane);car.y+=traffic*dt;if(overlap(game.player,car)){if(game.shield){game.shield=0;car.y=H+200;burst(game.player.x,game.player.y,"#d175ff",28);sound("shield");vibrate(35)}else{return end()}}if(!car.near&&car.y>game.player.y+car.height/2&&Math.abs(car.x-game.player.x)<65){car.near=true;game.score+=25;burst(car.x,game.player.y,"#ffffff",10);sound("near")}}for(const item of game.pickups){item.x=laneX(item.lane);item.y+=traffic*dt;if(game.magnet&&item.kind==="coin"){item.x+=(game.player.x-item.x)*Math.min(1,dt*4);item.y+=(game.player.y-item.y)*Math.min(1,dt*4)}if(overlap(game.player,item)){item.y=H+100;collect(item)}}game.obstacles=game.obstacles.filter(c=>c.y-c.height/2<H+30);game.pickups=game.pickups.filter(p=>p.y<H+40);for(const p of game.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}game.particles=game.particles.filter(p=>p.life>0);game.score=Math.max(game.score,Math.floor(game.elapsed*10*(game.nitro?1.7:1)));today();if(!data.daily.done){data.daily.progress=Math.max(data.daily.progress,Math.min(350,game.score));if(data.daily.progress===350){data.daily.done=true;game.coins+=15;sound("power")};save()}ui()}
      function rounded(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
      function road(){const left=32,w=W-left*2,lane=w/LANES,g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#180d35");g.addColorStop(.55,"#070c24");g.addColorStop(1,"#02030d");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle="#080d25";ctx.fillRect(left,0,w,H);ctx.strokeStyle="#8059d8";ctx.lineWidth=3;ctx.shadowColor="#814cff";ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(left,0);ctx.lineTo(left,H);ctx.moveTo(left+w,0);ctx.lineTo(left+w,H);ctx.stroke();ctx.shadowBlur=0;ctx.strokeStyle="#9c83ff88";ctx.setLineDash([20,42]);ctx.lineDashOffset=(game.elapsed*game.speed*.72)%62;for(let i=1;i<LANES;i++){ctx.beginPath();ctx.moveTo(left+lane*i,0);ctx.lineTo(left+lane*i,H);ctx.stroke()}ctx.setLineDash([]);ctx.fillStyle="#7958ff18";for(let y=30;y<H;y+=95)ctx.fillRect(left+5,y,w-10,3);ctx.fillStyle="#bb9dff33";for(let y=0;y<H;y+=80){ctx.fillRect(0,y,14,2);ctx.fillRect(W-14,y+32,14,2)}}
      function car(c,player=false){const{x,y,width:w,height:h}=c;ctx.save();ctx.translate(x,y);const color=player?skins[data.skin].color:c.color;ctx.shadowColor=color;ctx.shadowBlur=player?22:10;ctx.fillStyle=player?"#253751":"#20152f";rounded(-w*.27,-h*.08,w*.54,h*.48,8);ctx.fill();ctx.fillStyle="#c5d1e8";ctx.beginPath();ctx.arc(0,-h*.22,w*.18,0,Math.PI*2);ctx.fill();ctx.fillStyle=color;ctx.fillRect(-w*.34,h*.11,w*.68,h*.1);ctx.shadowBlur=0;ctx.strokeStyle="#10101c";ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(-w*.18,h*.25);ctx.lineTo(-w*.36,h*.44);ctx.moveTo(w*.18,h*.25);ctx.lineTo(w*.36,h*.44);ctx.stroke();ctx.strokeStyle=color;ctx.shadowColor=color;ctx.shadowBlur=18;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(w*.17,-h*.03);ctx.lineTo(w*.62,-h*.56);ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle="#172037";rounded(w*.08,-h*.1,w*.18,h*.14,3);ctx.fill();if(player&&(game.shield||game.nitro)){ctx.strokeStyle=game.shield?"#e5a6ff":"#4eefff";ctx.lineWidth=2;ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(0,0,w*.78,0,Math.PI*2);ctx.stroke()}if(!player){ctx.fillStyle="#eef4ff";ctx.font="bold 6px system-ui";ctx.textAlign="center";ctx.fillText(c.label,0,h*.08)}ctx.restore()}
      function pickup(p){ctx.save();ctx.translate(p.x,p.y);ctx.shadowColor=p.color;ctx.shadowBlur=14;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="#07111e";ctx.font="bold 14px system-ui";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(p.label,0,1);ctx.restore()}
      function render(){ctx.clearRect(0,0,W,H);road();for(const c of game.obstacles)car(c);for(const p of game.pickups)pickup(p);car(game.player,true);for(const p of game.particles){ctx.globalAlpha=Math.min(1,p.life*3);ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4)}ctx.globalAlpha=1;for(const r of game.rain){ctx.fillStyle=`rgba(206,194,255,${r.alpha})`;ctx.fillRect(r.x,r.y,2,Math.max(2,r.length*.16))}}
      function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;if(state===State.PLAYING)update(dt);render();if(state===State.PLAYING)frame=requestAnimationFrame(loop)}
      function unlockAudio(){if(!audio)audio=new (window.AudioContext||window.webkitAudioContext)();audio.resume?.()}function sound(kind){if(!data.sound||!audio)return;const map={move:[220,.04,"sine"],coin:[830,.06,"sine"],power:[420,.15,"triangle"],near:[640,.06,"square"],shield:[180,.18,"sine"],crash:[70,.25,"sawtooth"]},v=map[kind];if(!v)return;const o=audio.createOscillator(),g=audio.createGain();o.type=v[2];o.frequency.value=v[0];g.gain.setValueAtTime(.06,audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+v[1]);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+v[1])}function vibrate(pattern){navigator.vibrate?.(pattern)}
      $("#start-button").addEventListener("click",start);$("#restart-button").addEventListener("click",start);canvas.addEventListener("pointerdown",e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W;move(x<W/2?-1:1)},{passive:false});window.addEventListener("keydown",e=>{if(["ArrowLeft","a","A"].includes(e.key)){e.preventDefault();move(-1)}if(["ArrowRight","d","D"].includes(e.key)){e.preventDefault();move(1)}},{passive:false});
      soundButton.addEventListener("click",()=>{data.sound=!data.sound;save();soundButton.textContent=data.sound?"♪":"×";unlockAudio()});skinButton.addEventListener("click",()=>{const next=(data.skin+1)%skins.length;if(data.coins<skins[next].price){skinDetail.textContent=`Need ${skins[next].price-data.coins} more crystals`;return}data.skin=next;save();ui()});$("#share-button").addEventListener("click",async()=>{const text=`I scored ${game.score} in Nova Blade Rush! Can you beat me?`;try{if(navigator.share)await navigator.share({title:"Nova Blade Rush",text,url:location.href});else{await navigator.clipboard.writeText(`${text} ${location.href}`);$("#share-button").textContent="Copied!"}}catch{}});window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();installPrompt=e;$("#install").classList.remove("hidden")});$("#install").addEventListener("click",async()=>{if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;$("#install").classList.add("hidden")}});if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");window.addEventListener("resize",resize);resize();ui();soundButton.textContent=data.sound?"♪":"×";render();
    })();
  </script>
</body>
</html>
